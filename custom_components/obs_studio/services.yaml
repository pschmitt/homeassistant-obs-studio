set_scene:
  name: Set scene
  description: Switch to a specific scene in OBS Studio.
  target:
    entity:
      integration: obs_studio
  fields:
    scene_name:
      name: Scene name
      description: Exact name of the scene to switch to.
      required: true
      example: "Main Scene"
      selector:
        text:

start_stream:
  name: Start streaming
  description: Start the OBS stream.
  target:
    entity:
      integration: obs_studio

stop_stream:
  name: Stop streaming
  description: Stop the OBS stream.
  target:
    entity:
      integration: obs_studio

toggle_stream:
  name: Toggle streaming
  description: Toggle OBS streaming on or off.
  target:
    entity:
      integration: obs_studio

start_record:
  name: Start recording
  description: Start recording in OBS Studio.
  target:
    entity:
      integration: obs_studio

stop_record:
  name: Stop recording
  description: Stop recording in OBS Studio.
  target:
    entity:
      integration: obs_studio

toggle_record:
  name: Toggle recording
  description: Toggle OBS recording on or off.
  target:
    entity:
      integration: obs_studio

pause_record:
  name: Pause recording
  description: Pause the current OBS recording.
  target:
    entity:
      integration: obs_studio

resume_record:
  name: Resume recording
  description: Resume a paused OBS recording.
  target:
    entity:
      integration: obs_studio

start_virtual_cam:
  name: Start virtual camera
  description: Start the OBS virtual camera.
  target:
    entity:
      integration: obs_studio

stop_virtual_cam:
  name: Stop virtual camera
  description: Stop the OBS virtual camera.
  target:
    entity:
      integration: obs_studio

start_replay_buffer:
  name: Start replay buffer
  description: Start the OBS replay buffer.
  target:
    entity:
      integration: obs_studio

stop_replay_buffer:
  name: Stop replay buffer
  description: Stop the OBS replay buffer.
  target:
    entity:
      integration: obs_studio

save_replay_buffer:
  name: Save replay buffer
  description: Save the current OBS replay buffer clip.
  target:
    entity:
      integration: obs_studio

trigger_hotkey:
  name: Trigger hotkey
  description: Trigger a named OBS hotkey.
  target:
    entity:
      integration: obs_studio
  fields:
    hotkey_name:
      name: Hotkey name
      description: >-
        The OBS hotkey name to trigger (e.g. OBSBasic.StartStreaming,
        OBSBasic.Screenshot). Use the obs.list_hotkeys service to discover names.
      required: true
      example: "OBSBasic.StartStreaming"
      selector:
        text:
